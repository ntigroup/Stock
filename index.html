<script>
// ==================== CLOUD DATABASE ====================
// ⚠️ ระวังตอนแปะลิงก์: ต้องมีเครื่องหมาย " ปิดหัวท้ายลิงก์ และจบด้วย ; เสมอ
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwqeVRo2mtGuvpLS-QcJ6SY1XKOEjjQikqWW5aQFfddmYq2xMElqF_PKAn-BsWP1i6H/exec"; 

let PRODUCTS = {};
let productsLoaded = false;

window.onload = async function() {
  const statusEl = document.getElementById("cloud-status");
  try {
    // โค้ดดึงข้อมูล พร้อมทะลวง CORS
    const response = await fetch(WEB_APP_URL, { redirect: "follow" });
    PRODUCTS = await response.json();
    productsLoaded = true;
    const count = Object.keys(PRODUCTS).length;
    statusEl.innerHTML = `✔️ เชื่อมต่อคลาวด์สำเร็จ โหลดฐานข้อมูลแล้ว (${count.toLocaleString()} รายการ)`;
    statusEl.style.color = "#a3e635"; 
  } catch (error) {
    statusEl.innerHTML = "❌ ดึงข้อมูลไม่ได้ กรุณาเช็คการตั้งค่า Deploy หรือลิงก์ URL";
    statusEl.style.color = "#f87171";
  }
};

const PASSWORDS = { "ADMIN": "admin123", "Sittikorn": "sitt001", "Tree Vuthipong": "tree001", "Payungsak": "pay001", "Supply C.": "sup001" };
let currentTab = "receive"; let withdrawType = null; let selectedCode = ""; let pendingRecord = null; let acSelected = -1; let acResults = []; let history = [];

function updateNameDisplay(name, found) {
  const el = document.getElementById("inp-name");
  if (!name) { el.value = ""; el.placeholder = "— ยังไม่ได้เลือกสินค้า —"; el.style.color = "#333"; }
  else if (found) { el.value = "✔ " + name; el.style.color = "#2e7d32"; }
  else { el.value = "⚠️ ไม่พบในฐานข้อมูล"; el.style.color = "#e65100"; }
}

function onCodeInput() {
  if (!productsLoaded) return;
  const val = document.getElementById("inp-code").value.trim();
  selectedCode = ""; updateNameDisplay("", false); acSelected = -1;
  if (val.length < 2) { hideAC(); return; }
  
  const lower = val.toLowerCase(); acResults = [];
  for (const [code, name] of Object.entries(PRODUCTS)) {
    if (code.toLowerCase().includes(lower)) { acResults.push({code, name}); if (acResults.length >= 30) break; }
  }
  if (acResults.length === 0) { hideAC(); return; }
  renderAC();
}

function renderAC() {
  const list = document.getElementById("autocomplete-list"); list.innerHTML = "";
  acResults.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = i === acSelected ? "selected" : "";
    div.innerHTML = `<span class="code">${item.code}</span><span class="name">${item.name}</span>`;
    div.onclick = () => selectProduct(item.code, item.name);
    list.appendChild(div);
  });
  list.style.display = "block";
}

function onCodeKeydown(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    const val = document.getElementById("inp-code").value.trim();
    if (!val) return;
    if (acSelected >= 0 && acResults[acSelected]) { selectProduct(acResults[acSelected].code, acResults[acSelected].name); return; }
    const lowerVal = val.toLowerCase();
    for (const [code, name] of Object.entries(PRODUCTS)) {
      if (code.toLowerCase() === lowerVal) { selectProduct(code, name); return; }
    }
    if (acResults.length > 0) { selectProduct(acResults[0].code, acResults[0].name); }
  } else if (e.key === "ArrowDown") {
    if (!acResults.length) return; acSelected = Math.min(acSelected + 1, acResults.length - 1); renderAC(); e.preventDefault();
  } else if (e.key === "ArrowUp") {
    if (!acResults.length) return; acSelected = Math.max(acSelected - 1, 0); renderAC(); e.preventDefault();
  } else if (e.key === "Escape") { hideAC(); }
}

function selectProduct(code, name) { selectedCode = code; document.getElementById("inp-code").value = code; updateNameDisplay(name, true); hideAC(); }
function hideAC() { document.getElementById("autocomplete-list").style.display = "none"; }
document.addEventListener("click", e => { if (!e.target.closest(".product-wrap")) hideAC(); });

function switchTab(tab) {
  currentTab = tab; document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelector(`.tab-btn.${tab}`).classList.add("active");
  const wo = document.getElementById("withdraw-options"); const rrw = document.getElementById("receive-remark-wrap");
  const btn = document.getElementById("btn-submit"); const title = document.getElementById("form-title");
  
  if (tab === "withdraw") {
    wo.style.display = "block"; rrw.style.display = "none"; btn.className = "btn-submit withdraw"; btn.textContent = "💾 บันทึกการเบิก"; title.textContent = "📤 บันทึกการเบิกสินค้า";
  } else {
    wo.style.display = "none"; rrw.style.display = "block"; btn.className = "btn-submit receive"; btn.innerHTML = "💾 บันทึกรับเข้า"; title.textContent = "📥 บันทึกการรับสินค้าเข้า";
    withdrawType = null; document.getElementById("radio-customer").checked = false; document.getElementById("radio-borrow").checked = false;
    document.getElementById("customer-field").style.display = "none"; document.getElementById("borrow-field").style.display = "none";
    document.querySelectorAll(".radio-label").forEach(l => l.className = "radio-label");
  }
  clearErrors();
}

function setWithdrawType(type) {
  withdrawType = type; document.getElementById("radio-customer").checked = type === "customer"; document.getElementById("radio-borrow").checked = type === "borrow";
  document.getElementById("lbl-customer").className = "radio-label" + (type==="customer" ? " active-customer" : "");
  document.getElementById("lbl-borrow").className = "radio-label" + (type==="borrow" ? " active-borrow" : "");
  document.getElementById("customer-field").style.display = type === "customer" ? "block" : "none";
  document.getElementById("borrow-field").style.display = type === "borrow" ? "block" : "none";
}

function clearErrors() { document.querySelectorAll(".error").forEach(el => el.classList.remove("error")); }
function validate() {
  clearErrors(); let ok = true;
  const code = document.getElementById("inp-code").value.trim(); const qty = document.getElementById("inp-qty").value; const user = document.getElementById("inp-user").value;
  if (!code) { document.getElementById("inp-code").classList.add("error"); ok = false; }
  if (!qty || parseInt(qty) <= 0) { document.getElementById("inp-qty").classList.add("error"); ok = false; }
  if (!user) { document.getElementById("inp-user").classList.add("error"); ok = false; }
  if (currentTab === "withdraw") {
    if (!withdrawType) { showToast("กรุณาเลือกประเภทการเบิก (ส่งลูกค้า / ยืม)", "error"); ok = false; }
    else if (withdrawType === "customer" && !document.getElementById("inp-customer").value.trim()) { document.getElementById("inp-customer").classList.add("error"); ok = false; }
    else if (withdrawType === "borrow" && !document.getElementById("inp-borrow-note").value.trim()) { document.getElementById("inp-borrow-note").classList.add("error"); ok = false; }
  }
  if (!ok && currentTab !== "withdraw") showToast("กรุณากรอกข้อมูลให้ครบถ้วน", "error");
  return ok;
}

function handleSubmit() {
  if (!validate()) return;
  const code = document.getElementById("inp-code").value.trim(); const name = selectedCode ? PRODUCTS[selectedCode] || code : code;
  const qty = parseInt(document.getElementById("inp-qty").value); const user = document.getElementById("inp-user").value;
  const remark = currentTab === "receive" ? document.getElementById("inp-remark").value.trim() : "";
  let extra = "";
  if (currentTab === "withdraw") extra = withdrawType === "customer" ? "ลูกค้า: " + document.getElementById("inp-customer").value.trim() : "ยืม: " + document.getElementById("inp-borrow-note").value.trim();
  pendingRecord = { code, name, qty, user, type: currentTab, wtype: withdrawType, extra, remark }; openModal(user);
}

function openModal(user) {
  document.getElementById("modal-user-label").innerHTML = `กรุณาใส่รหัสผ่านของ <strong>${user}</strong>`;
  document.getElementById("modal-password").value = ""; document.getElementById("pw-error").style.display = "none";
  document.getElementById("modal-bg").classList.add("show"); setTimeout(() => document.getElementById("modal-password").focus(), 100);
}
function closeModal() { document.getElementById("modal-bg").classList.remove("show"); pendingRecord = null; }
function confirmPassword() {
  if (document.getElementById("modal-password").value !== PASSWORDS[pendingRecord.user]) {
    document.getElementById("pw-error").style.display = "block"; document.getElementById("modal-password").value = ""; document.getElementById("modal-password").focus(); return;
  }
  closeModal(); saveRecord(pendingRecord);
}

async function saveRecord(rec) {
  showToast("⏳ กำลังบันทึกข้อมูลลงฐานข้อมูล...", "");
  try {
    // ส่งข้อมูลแบบ no-cors ไม่ต้องรอรับคำตอบจากกูเกิลเพื่อกัน Error บล็อก
    await fetch(WEB_APP_URL, {
      method: "POST", 
      body: JSON.stringify(rec), 
      headers: { "Content-Type": "text/plain" },
      mode: "no-cors"
    });
    
    const now = new Date();
    const dt = now.toLocaleDateString("th-TH",{day:"2-digit",month:"2-digit",year:"numeric"}) + " " + now.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
    history.unshift({ ...rec, dt, id: history.length + 1 });
    renderHistory(); resetForm();
    showToast(rec.type === "receive" ? "✔ บันทึกรับเข้าสำเร็จ!" : "✔ บันทึกการเบิกสำเร็จ!", "success");
    
  } catch (error) {
    showToast("❌ ส่งข้อมูลไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต", "error");
  }
}

function resetForm() {
  document.getElementById("inp-code").value = ""; const nameEl = document.getElementById("inp-name");
  nameEl.value = ""; nameEl.placeholder = "— ยังไม่ได้เลือกสินค้า —"; nameEl.style.color = "#333";
  document.getElementById("inp-qty").value = ""; document.getElementById("inp-remark").value = ""; document.getElementById("inp-customer").value = "";
  document.getElementById("inp-borrow-note").value = ""; document.getElementById("inp-user").value = "";
  selectedCode = ""; withdrawType = null; hideAC();
  document.getElementById("radio-customer").checked = false; document.getElementById("radio-borrow").checked = false;
  document.getElementById("customer-field").style.display = "none"; document.getElementById("borrow-field").style.display = "none";
  document.querySelectorAll(".radio-label").forEach(l => l.className = "radio-label"); clearErrors();
}

function renderHistory() {
  const tbody = document.getElementById("history-body"); document.getElementById("hist-count").textContent = history.length;
  if (!history.length) return;
  tbody.innerHTML = history.map((r,i) => {
    const typeBadge = r.type === "receive" ? `<span class="badge receive">📥 รับเข้า</span>` : `<span class="badge withdraw">📤 เบิก</span>`;
    const extraBadge = r.type === "withdraw" 
      ? (r.wtype === "customer" ? `<span class="badge customer">📦 ส่งลูกค้า</span><br><small>${r.extra.replace("ลูกค้า: ","")}</small>` : `<span class="badge borrow">🔄 ยืม</span><br><small>${r.extra.replace("ยืม: ","")}</small>`)
      : (r.remark || "—");
    return `<tr>
      <td style="color:#888;font-weight:600">${history.length - i}</td><td style="white-space:nowrap;font-size:11px">${r.dt}</td>
      <td>${typeBadge}</td><td><strong>${r.code}</strong></td><td style="max-width:200px;font-size:12px">${r.name}</td>
      <td style="text-align:center;font-weight:700">${r.qty.toLocaleString()}</td><td>${r.user}</td><td style="font-size:12px">${extraBadge}</td>
    </tr>`;
  }).join("");
}

function showToast(msg, type = "") {
  const t = document.getElementById("toast"); t.textContent = msg; t.className = "toast show " + type;
  setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
